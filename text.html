<h1>
水瓶座（Aquarius）1/20~2/18
</h1>

<p>

形像是一個持著瓶子在斟酒的美少年蓋尼米德，
據說他是特洛伊的王子。

</p>

<p>

有一天，
他替父親看羊時，
宙斯在天空經過，

一見蓋尼米德即對他迷戀，
變身成一隻老鷹擄走蓋尼米德到奧林匹斯山。

</p>

<p>

而蓋尼米德從此成為宙斯身旁的倒酒僮。

</p>
