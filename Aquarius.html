<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Aquarius AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>

    html,
    body,
    a-scene{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      touch-action:none;
      font-family:"Microsoft JhengHei",sans-serif;
    }

    /* 底部按鈕 */

    #bottom-menu{

      position:fixed;

      bottom:20px;
      left:50%;

      transform:translateX(-50%);

      width:92%;

      display:flex;

      justify-content:space-around;

      align-items:center;

      z-index:9999;
    }

    .menu-btn{

      background:none;

      border:none;

      display:flex;

      flex-direction:column;

      align-items:center;

      font-size:40px;

      font-weight:bold;

      color:#111;
    }

    .menu-btn span{

      margin-top:6px;

      font-size:16px;

      letter-spacing:3px;
    }

    /* 朗讀按鈕 */

    #story-btn{

      width:72px;
      height:72px;

      border-radius:50%;

      background:#79a9ff;

      color:white;

      font-size:34px;
    }

    #story-btn span{
      color:#111;
      margin-top:10px;
    }

  </style>

</head>

<body>

  <!-- 底部按鈕 -->

  <div id="bottom-menu">

    <button class="menu-btn" id="other-btn">
      ♒
      <span>其他相機</span>
    </button>

    <button class="menu-btn" id="text-btn">
      💬
      <span>文本</span>
    </button>

    <button class="menu-btn" id="story-btn">
      ▶
      <span>朗讀</span>
    </button>

  </div>

  <!-- AR -->

  <a-scene

    mindar-image="
      imageTargetSrc: Aquarius.mind;
      autoStart: true;
    "

    color-space="sRGB"

    renderer="
      colorManagement: true;
      physicallyCorrectLights: true
    "

    vr-mode-ui="enabled: false"

    device-orientation-permission-ui="
      enabled: false
    "

  >

    <!-- 模型 -->

    <a-assets>

      <a-asset-item
        id="AquariusModel"
        src="Aquarius.glb">
      </a-asset-item>

    </a-assets>

    <!-- 相機 -->

    <a-camera
      look-controls="enabled:false">
    </a-camera>

    <!-- 光源 -->

    <a-light
      type="ambient"
      intensity="1.5">
    </a-light>

    <a-light
      type="directional"
      intensity="2"
      position="2 4 2">
    </a-light>

    <!-- AR Target -->

    <a-entity
      mindar-image-target="
      targetIndex: 0
    ">

      <!-- 模型 -->

      <a-entity
        id="modelContainer"
        scale="0.1 0.1 0.1">

        <a-gltf-model
          src="#AquariusModel"
          position="0 0 0">
        </a-gltf-model>

      </a-entity>

    </a-entity>

  </a-scene>

  <!-- 按鈕功能 -->

  <script>

    const textBtn =
      document.querySelector("#text-btn");

    const storyBtn =
      document.querySelector("#story-btn");

    const otherBtn =
      document.querySelector("#other-btn");

    /* 文本 */

    textBtn.addEventListener(
      "click",
      ()=>{

        window.location.href =
          "text.html";

      }
    );

    /* 朗讀 */

    storyBtn.addEventListener(
      "click",
      ()=>{

        window.location.href =
          "story.html";

      }
    );

    /* 返回 */

    otherBtn.addEventListener(
      "click",
      ()=>{

        history.back();

      }
    );

  </script>

</body>

</html>
